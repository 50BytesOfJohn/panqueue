name: Bug report
description: Report something that is not working as expected.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Panqueue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code, repository, or steps that reproduce the issue.
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: Node 22, Bun 1.x, Deno 2.x
    validations:
      required: true
  - type: input
    id: redis
    attributes:
      label: Redis version
      placeholder: Redis 7.x
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, config, stack traces, or other useful details.
    validations:
      required: false
