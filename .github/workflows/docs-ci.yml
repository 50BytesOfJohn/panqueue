name: Docs CI

on:
  pull_request:
    paths:
      - "apps/docs/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    name: Build and typecheck docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.6.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: npm install -g npm@11.17.0

      - run: pnpm install --frozen-lockfile

      - name: Typecheck docs
        run: pnpm docs:typecheck

      - name: Build docs
        run: pnpm docs:build
