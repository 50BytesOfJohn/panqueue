name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build, typecheck & test (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (Vitest on Node)
        run: pnpm test

      # Slow-types across all packages are enforced by `isolatedDeclarations`
      # in the build + typecheck steps above. This dry-run additionally
      # validates the JSR toolchain + generated jsr.json end-to-end on `core`
      # (the dependency-free package — dependent packages cannot fully
      # publish-simulate until their `jsr:@panqueue/*` siblings exist on JSR).
      - name: JSR publish dry-run (core)
        run: |
          node scripts/gen-jsr-json.mjs
          cd packages/core && npx jsr publish --dry-run --allow-dirty

  smoke-bun:
    name: Smoke test (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm smoke:bun

  smoke-deno:
    name: Smoke test (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm smoke:deno
