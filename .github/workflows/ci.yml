name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.6.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: npm install -g npm@11.17.0

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

  test:
    name: Build, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.6.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: npm install -g npm@11.17.0

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (Vitest on Node)
        run: pnpm test

      - name: Lint published artifacts (publint)
        run: pnpm publint

      # Slow-types across all packages are enforced by `isolatedDeclarations`
      # in the build + typecheck steps above. This dry-run additionally
      # validates the JSR toolchain + generated jsr.json end-to-end on `core`
      # (the dependency-free package — dependent packages cannot fully
      # publish-simulate until their `jsr:@panqueue/*` siblings exist on JSR).
      - name: JSR publish dry-run (core)
        run: |
          pnpm gen:jsr
          cd packages/core && npx jsr publish --dry-run --allow-dirty
