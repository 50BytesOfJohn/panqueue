name: Release

on:
  push:
    branches:
      - main

# Single in-flight release run; never cancel a publish midway.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tags
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # Per-package flags (manifest mode). The node-workspace plugin bumps
      # dependents too, so a `core` release also releases config/client/worker,
      # while a leaf like `worker` can be released on its own.
      core: ${{ steps.release.outputs['packages/core--release_created'] }}
      config: ${{ steps.release.outputs['packages/config--release_created'] }}
      client: ${{ steps.release.outputs['packages/client--release_created'] }}
      worker: ${{ steps.release.outputs['packages/worker--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # The default GITHUB_TOKEN cannot trigger other workflows, so CI does
          # not run on the release PR. Set a fine-grained PAT (contents +
          # pull-requests: write) as RELEASE_PLEASE_TOKEN to get CI checks on
          # release PRs; without it, releases still work but the PR shows no
          # checks.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm + JSR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) + JSR OIDC
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.6.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: npm install -g npm@11.17.0

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      # Auth is npm trusted publishing only — no tokens. pnpm exchanges the
      # GitHub OIDC token for a short-lived npm token (needs id-token: write
      # above), and npm generates provenance attestations automatically. Each
      # package must have this repo + workflow configured as a trusted
      # publisher on npmjs.com (first versions are published manually from a
      # local machine) — see RELEASING.md.
      #
      # pnpm publishes in dependency order (core before its dependents) and
      # skips any package whose version is already on npm, so this safely
      # publishes only the packages Release Please just bumped. Running through
      # pnpm (not bare npm) rewrites `workspace:*` to concrete version ranges.
      - name: Publish to npm (trusted publishing + provenance)
        run: pnpm --filter "./packages/*" -r publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"

      # JSR publishes source (not dist) and has no "skip if already published",
      # so each package is published only when Release Please bumped it, in
      # dependency order so a package's `jsr:@panqueue/*` siblings already exist.
      # `jsr publish` authenticates via GitHub OIDC (needs id-token: write);
      # each package must have this GitHub repo linked on jsr.io — see
      # RELEASING.md.
      - name: Generate jsr.json from each package.json
        run: pnpm gen:jsr

      - name: Publish @panqueue/core to JSR
        if: ${{ needs.release-please.outputs.core == 'true' }}
        working-directory: packages/core
        run: npx jsr publish --allow-dirty

      - name: Publish @panqueue/config to JSR
        if: ${{ needs.release-please.outputs.config == 'true' }}
        working-directory: packages/config
        run: npx jsr publish --allow-dirty

      - name: Publish @panqueue/client to JSR
        if: ${{ needs.release-please.outputs.client == 'true' }}
        working-directory: packages/client
        run: npx jsr publish --allow-dirty

      - name: Publish @panqueue/worker to JSR
        if: ${{ needs.release-please.outputs.worker == 'true' }}
        working-directory: packages/worker
        run: npx jsr publish --allow-dirty
